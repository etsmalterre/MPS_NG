services:
  postgres:
    image: postgres:16
    container_name: mps-postgres-dev
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: mps_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    volumes:
      - mps_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./data_migration/data:/data
      - ./data_migration/import:/import
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mps_postgres_data:
